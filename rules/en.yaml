phrases_high_risk:
  # Terrorism / Radicalization
  - "death to the west"
  - "join the jihad"
  - "holy war"
  - "suicide vest"
  - "pledge allegiance"
  # Trafficking / Weapons
  - "shipping drugs"
  - "assault rifles for sale"
  - "unregistered firearms"
  - "fake passports"
  - "money laundering"
  # Extreme Left / Sabotage
  - "armed insurrection"
  - "overthrow the regime"
  - "infrastructure sabotage"
  - "burn the system"
  - "urban guerrilla"
  # Espionage
  - "classified document leak"
  - "intel breach"
  - "industrial espionage"
  # Child Exploitation (IOCs)
  - "cp channel link"
  - "leaked kids material"

keywords_medium_risk:
  - "bomb"
  - "explosives"
  - "terrorism"
  - "drugs"
  - "weapons"
  - "attack"
  - "revolution"
  - "intelligence"
  - "hacked"
  - "anarchy"

regex_indicators:
  - "(?i)(terrorist|jihad|explosive|isis)"
  - "(?i)(heroin|cocaine|fentanyl|smuggling)"
  - "(?i)(ak-47|firearms|ammunition|glock)"
  - "(?i)(leaked|classified|top secret)"

topic_buckets:
  - category: "terrorism"
    weight: 2.0
  - category: "trafficking"
    weight: 1.8
  - category: "extremism"
    weight: 1.5
  - category: "espionage"
    weight: 1.7
  - category: "pedophilia"
    weight: 3.0
