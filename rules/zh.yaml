phrases_high_risk:
  # Terrorism / Radicalization / Separatism
  - "圣战" # Jihad
  - "恐怖袭击" # Terrorist attack
  - "推翻政府" # Overthrow government
  - "分裂国家" # Split the country
  - "独立运动" # Independence movement (radical)
  # Crime / Trafficking
  - "贩毒" # Drug trafficking
  - "军火交易" # Arms trade
  - "假护照" # Fake passport
  - "洗钱" # Money laundering
  # Sabotage / Hacking
  - "破坏基础设施" # Sabotage infrastructure
  - "绝密文件" # Top secret document
  # Illegal Content
  - "幼态视频" # Pedophilia code
  - "电报群组cp" # Telegram group CP

keywords_medium_risk:
  - "炸弹" # Bomb
  - "武器" # Weapon
  - "毒品" # Drugs
  - "间谍" # Spy
  - "渗透" # Infiltration

regex_indicators:
  - "(?i)(恐怖|爆炸|圣战)"
  - "(?i)(走私|毒品|洗钱)"

topic_buckets:
  - category: "terrorism"
    weight: 2.0
  - category: "trafficking"
    weight: 1.8
  - category: "extremism"
    weight: 1.5
